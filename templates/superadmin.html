<script>

firebase.auth().onAuthStateChanged(async (user)=>{

    if(!user){

        window.location.href="/login";
        return;
    }

    const doc =
    await db.collection("users")
    .doc(user.uid)
    .get();

    if(!doc.exists){

        alert("Access Denied");

        window.location.href="/dashboard";
        return;
    }

    const data = doc.data();

    if(data.role !== "superadmin"){

        alert("Access Denied");

        window.location.href="/dashboard";
        return;
    }

});

</script>
